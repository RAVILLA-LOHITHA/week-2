<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - ShopSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">ShopSphere</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link active" href="cart.html">Cart 🛒 <span class="badge bg-danger" id="cartCount">0</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Cart Section -->
  <div class="container my-5">
    <div class="row">
      <!-- Cart Items -->
      <div class="col-lg-8">
        <h2 class="mb-4">Your Cart</h2>
        <div id="cartItems" class="list-group"></div>
      </div>

      <!-- Order Summary -->
      <div class="col-lg-4">
        <div class="card shadow p-3">
          <h4>Order Summary</h4>
          <p>Items: <span id="itemCount">0</span></p>
          <p>Subtotal: <span id="subtotal">₹0</span></p>
          <p>Total: <span id="total">₹0</span></p>
          <button class="btn btn-success w-100 mt-3" onclick="checkout()">Checkout</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-4 mt-5">
    <p>&copy; 2026 ShopSphere | Academic Project Submission</p>
  </footer>

  <script src="js/cart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
