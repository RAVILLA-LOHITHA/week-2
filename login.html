<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ShopSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">ShopSphere</a>
    </div>
  </nav>

  <div class="container my-5">
    <div class="card shadow p-4 mx-auto" style="max-width:420px;">
      <h2 class="text-center mb-3">Welcome Back</h2>
      <form id="loginForm">
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <p class="text-center mt-3">Don't have an account? <a href="register.html" class="text-primary fw-bold">Register here</a></p>
    </div>
  </div>

  <footer class="bg-dark text-white text-center py-4 mt-5">
    <p>&copy; 2026 ShopSphere | Academic Project Submission</p>
  </footer>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
      if (!email.match(emailPattern)) {
        alert("❌ Invalid email format.");
        return;
      }
      if (!password) {
        alert("❌ Password is required.");
        return;
      }
      alert("✅ Login Successful!");
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
