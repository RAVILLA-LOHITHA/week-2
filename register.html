<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ShopSphere</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">ShopSphere</a>
    </div>
  </nav>

  <!-- Register Form -->
  <div class="container my-5">
    <div class="card shadow p-4 mx-auto" style="max-width:420px;">
      <h2 class="text-center mb-3">Create New Account</h2>
      <form id="registerForm">
        <div class="mb-3">
          <label for="fullname" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullname" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required>
        </div>
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirmPassword" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Register Now</button>
      </form>
      <p class="text-center mt-3">Already have an account? <a href="login.html" class="text-primary fw-bold">Login here</a></p>
    </div>
  </div>

  <footer class="bg-dark text-white text-center py-4 mt-5">
    <p>&copy; 2026 ShopSphere | Academic Project Submission</p>
  </footer>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) {
        alert("❌ Passwords do not match!");
        return;
      }
      if (password.length < 6) {
        alert("❌ Password must be at least 6 characters long.");
        return;
      }
      alert("🎉 Registration Successful!\n\nWelcome to ShopSphere!\nYou can now login.");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
